name: 🎬 Gerar Short de Podcast

on:
  workflow_dispatch:
    inputs:
      canal_url:
        description: 'URL do canal (opcional, ex: https://www.youtube.com/@Podpah/videos)'
        required: false
        default: ''

permissions:
  contents: write

env:
  GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
  PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
  YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  CANAL_URL:                 ${{ github.event.inputs.canal_url }}

jobs:
  gerar-short:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Bypass YouTube: Cloudflare WARP ──────────────────────────────────────
      # Roda o tráfego pelo WARP da Cloudflare para disfarçar o IP do datacenter
      - name: 🌐 Instalar Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq
          sudo apt-get install -y cloudflare-warp
          echo "✅ WARP instalado"

      - name: 🔌 Conectar ao Cloudflare WARP
        run: |
          sudo warp-svc &
          sleep 5
          warp-cli --accept-tos registration new || true
          sleep 3
          warp-cli --accept-tos connect || true
          sleep 5
          warp-cli --accept-tos status || true
          curl -s https://ifconfig.me || true
          echo "✅ Conexão WARP ativada"

      # ── Bypass YouTube: Deno para resolver JS challenges ─────────────────────
      - name: 🦕 Instalar Deno (runtime JS para yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: 🎬 Instalar FFmpeg e dependências
        run: |
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu-extra \
            fonts-liberation \
            fonts-freefont-ttf \
            libgl1 \
            libglib2.0-0

      - name: 🎥 Instalar yt-dlp (mais atualizado para anti-bot)
        run: |
          # Instala via pip para garantir versão mais recente e compatível com Python
          pip install -U "yt-dlp[default]"
          yt-dlp --version

      - name: 📦 Instalar dependências Python (incluindo curl-cffi para TLS)
        run: |
          pip install -r requirements.txt
          pip install curl-cffi  # Fingerprint TLS de browser real

      - name: 🍪 Configurar Cookies do YouTube
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "✅ Cookies configurados!"
            wc -l cookies.txt
          else
            echo "⚠️ YOUTUBE_COOKIES não configurado."
          fi

      - name: 📁 Criar diretórios necessários
        run: |
          mkdir -p output/clips output/tmp data assets/musicas

      - name: 🎬 Executar pipeline de cortes
        run: python scripts/pipeline.py

      - name: 📊 Verificar arquivos gerados
        if: always()
        run: |
          echo "📁 Arquivos em output/:"
          ls -lh output/ 2>/dev/null || echo "(vazia)"
          echo ""
          echo "📋 Vídeos já processados:"
          cat data/videos_processados.json 2>/dev/null | python3 -c "
          import json,sys
          try:
              data=json.load(sys.stdin)
              print(f'Total processados: {len(data)}')
              for vid_id, info in list(data.items())[-3:]:
                  print(f'  • {vid_id}: {info.get(\"titulo\",\"-\")[:50]}')
          except: print('(arquivo não encontrado ou inválido)')
          " || echo ""

      - name: 💾 Salvar tracking no repositório
        if: always()
        run: |
          git config user.name "Canal Cortes Bot"
          git config user.email "bot@canal-cortes.com"
          git add data/videos_processados.json
          git diff --staged --quiet || git commit -m "🎬 Atualiza tracking de vídeos processados [skip ci]"
          git pull --rebase origin main || git pull --rebase origin master || true
          git push || true

      - name: 📤 Upload dos artefatos (backup por 7 dias)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: short-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/short_final.mp4
            output/short_base.mp4
            output/legendas.srt
            output/metadados.json
          retention-days: 7
